<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RZ Garage - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0f0f0f;
        color: #ffffff;
        font-family: Arial, sans-serif;
      }
      .admin-wrapper {
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 240px;
        background: #111111;
        color: #ffffff;
        padding: 25px 20px;
        border-right: 1px solid #222222;
      }
      .sidebar h3 {
        color: #ffffff;
        font-size: 22px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 30px;
        border-left: 4px solid #ff0000;
        padding-left: 10px;
      }
      .sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .sidebar ul li a {
        display: block;
        color: #aaaaaa;
        padding: 14px;
        text-decoration: none;
        font-size: 15px;
        transition: 0.3s;
      }
      .sidebar ul li a.active,
      .sidebar ul li a:hover {
        color: #ffffff;
        background: #ff0000;
      }

      .admin-content {
        flex: 1;
        padding: 40px;
      }
      .admin-content h2 {
        font-size: 28px;
        text-transform: uppercase;
        margin-bottom: 5px;
      }
      .admin-content p {
        color: #aaaaaa;
        margin-bottom: 30px;
      }

      .admin-table {
        width: 100%;
        border-collapse: collapse;
        background: #161616;
      }
      .admin-table th,
      .admin-table td {
        padding: 16px;
        border: 1px solid #252525;
        text-align: left;
      }
      .admin-table th {
        background: #ff0000;
        color: #ffffff;
        text-transform: uppercase;
        font-size: 14px;
        letter-spacing: 0.5px;
      }
      .admin-table td {
        color: #dddddd;
        font-size: 15px;
      }

      .status {
        padding: 6px 12px;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
      }
      .status.pending {
        background: #331111;
        color: #ff4444;
      } /* Merah redup */
      .status.process {
        background: #112233;
        color: #3399ff;
      } /* Biru sport */
      .status.done {
        background: #113311;
        color: #00cc44;
      } /* Hijau aman */

      .btn-status {
        background: #ffffff;
        color: #000000;
        border: none;
        padding: 8px 14px;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 12px;
        transition: 0.2s;
      }
      .btn-status:hover {
        background: #ff0000;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="admin-wrapper">
      <aside class="sidebar">
        <h3>RZ Admin</h3>
        <ul>
          <li>
            <a href="#" class="active"
              ><i class="fa-solid fa-gauge"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="index.html"
              ><i class="fa-solid fa-right-from-bracket"></i> Keluar Halaman</a
            >
          </li>
        </ul>
      </aside>

      <main class="admin-content">
        <h2>Manajemen Antrean & Update Status Kerja</h2>
        <p>Data pesanan servis masuk dari web pelanggan:</p>

        <table class="admin-table">
          <thead>
            <tr>
              <th>No. Antrean</th>
              <th>Pelat Nomor</th>
              <th>Layanan</th>
              <th>Jam Sesi</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>#001</td>
              <td>K 4321 BK</td>
              <td>Service CVT</td>
              <td>09:00 WIB</td>
              <td><span class="status pending">Menunggu</span></td>
              <td>
                <button class="btn-status" onclick="ubahStatus(this)">
                  Kerjakan
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </main>
    </div>

    <script>
      function ubahStatus(button) {
        const row = button.closest("tr");
        const statusSpan = row.querySelector(".status");

        if (statusSpan) {
          if (statusSpan.classList.contains("pending")) {
            statusSpan.classList.remove("pending");
            statusSpan.classList.add("process");
            statusSpan.innerText = "Dikerjakan";
            button.innerText = "Selesaikan";
          } else if (statusSpan.classList.contains("process")) {
            statusSpan.classList.remove("process");
            statusSpan.classList.add("done");
            statusSpan.innerText = "Selesai";
            button.style.display = "none";
          }
        }
      }
    </script>
  </body>
</html>
